    <div class="card-num">10</div>
    <div class="card-title">AI Security Red-Team</div>
    <div class="card-risk"><span class="dot dot-ro"></span>read-only</div>
  </div></foreignObject>

  <!-- Row 3 -->
  <foreignObject x="24" y="328" width="192" height="136"><div xmlns="http://www.w3.org/1999/xhtml" class="card">
    <div class="card-num">11</div>
    <div class="card-title">Adversarial Review Engine</div>
    <div class="card-risk"><span class="dot dot-ro"></span>read-only</div>
  </div></foreignObject>

  <foreignObject x="232" y="328" width="192" height="136"><div xmlns="http://www.w3.org/1999/xhtml" class="card">
    <div class="card-num">12</div>
    <div class="card-title">Test, Mutation &amp; Chaos</div>
    <div class="card-risk"><span class="dot dot-bm"></span>branch-mutating</div>
  </div></foreignObject>

  <foreignObject x="440" y="328" width="192" height="136"><div xmlns="http://www.w3.org/1999/xhtml" class="card">
    <div class="card-num">13</div>
    <div class="card-title">Architectural Drift &amp; Debt</div>
    <div class="card-risk"><span class="dot dot-ro"></span>read-only</div>
  </div></foreignObject>

  <foreignObject x="648" y="328" width="192" height="136"><div xmlns="http://www.w3.org/1999/xhtml" class="card">
    <div class="card-num">14</div>
    <div class="card-title">Governance &amp; Telemetry</div>
    <div class="card-risk"><span class="dot dot-ro"></span>read-only</div>
  </div></foreignObject>

  <foreignObject x="856" y="328" width="192" height="136"><div xmlns="http://www.w3.org/1999/xhtml" class="card">
    <div class="card-num">15</div>
    <div class="card-title">Self-Optimization Meta-Loop</div>
    <div class="card-risk"><span class="dot dot-bm"></span>branch-mutating</div>
  </div></foreignObject>

  <!-- Legend -->
  <foreignObject x="24" y="480" width="1024" height="34"><div xmlns="http://www.w3.org/1999/xhtml" class="legend">
    <span><span class="dot dot-ro"></span>read-only</span>
    <span><span class="dot dot-bm"></span>branch-mutating</span>
    <span><span class="dot dot-it"></span>infra-touching</span>
  </div></foreignObject>
