<svg width="1072" height="530" viewBox="0 0 1072 530" xmlns="http://www.w3.org/2000/svg">
  <title>The 15 Agentic Loops</title>
  <style>
    .card {
      box-sizing: border-box;
      width: 100%; height: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid rgba(11,11,11,0.12);
      background: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    .card-num { font-size: 12px; font-weight: 700; letter-spacing: 0.03em; color: #898781; }
    .card-title { font-size: 14.5px; font-weight: 700; line-height: 1.25; color: #0b0b0b; margin-top: 4px; }
    .card-risk { font-size: 11px; color: #52514e; display: flex; align-items: center; gap: 6px; margin-top: 8px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex: none; }
    .dot-ro { background: #6da7ec; }
    .dot-bm { background: #2a78d6; }
    .dot-it { background: #104281; }
    .legend { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 12px; color: #52514e;
      display: flex; align-items: center; justify-content: center; gap: 28px; height: 100%; }
    .legend span { display: inline-flex; align-items: center; gap: 6px; }
    @media (prefers-color-scheme: dark) {
      .card { background: #232322; border-color: rgba(255,255,255,0.12); }
      .card-num { color: #898781; }
      .card-title { color: #ffffff; }
      .card-risk { color: #c3c2b7; }
      .dot-ro { background: #184f95; }
      .dot-bm { background: #3987e5; }
      .dot-it { background: #86b6ef; }
      .legend { color: #c3c2b7; }
    }
  </style>

  <!-- Row 1 -->
  <foreignObject x="24" y="24" width="192" height="136"><div xmlns="http://www.w3.org/1999/xhtml" class="card">
    <div class="card-num">01</div>
    <div class="card-title">Backend &amp; API Hardening</div>
    <div class="card-risk"><span class="dot dot-bm"></span>branch-mutating</div>
  </div></foreignObject>

  <foreignObject x="232" y="24" width="192" height="136"><div xmlns="http://www.w3.org/1999/xhtml" class="card">
    <div class="card-num">02</div>
    <div class="card-title">Frontend &amp; Accessibility</div>
    <div class="card-risk"><span class="dot dot-bm"></span>branch-mutating</div>
  </div></foreignObject>

  <foreignObject x="440" y="24" width="192" height="136"><div xmlns="http://www.w3.org/1999/xhtml" class="card">
    <div class="card-num">03</div>
    <div class="card-title">Mobile &amp; Native Hardening</div>
    <div class="card-risk"><span class="dot dot-bm"></span>branch-mutating</div>
  </div></foreignObject>

  <foreignObject x="648" y="24" width="192" height="136"><div xmlns="http://www.w3.org/1999/xhtml" class="card">
    <div class="card-num">04</div>
    <div class="card-title">Agent Runtime &amp; Tooling</div>
    <div class="card-risk"><span class="dot dot-bm"></span>branch-mutating</div>
  </div></foreignObject>

  <foreignObject x="856" y="24" width="192" height="136"><div xmlns="http://www.w3.org/1999/xhtml" class="card">
    <div class="card-num">05</div>
    <div class="card-title">Agentic Memory Hardening</div>
    <div class="card-risk"><span class="dot dot-bm"></span>branch-mutating</div>
  </div></foreignObject>

  <!-- Row 2 -->
  <foreignObject x="24" y="176" width="192" height="136"><div xmlns="http://www.w3.org/1999/xhtml" class="card">
    <div class="card-num">06</div>
    <div class="card-title">UX/UI Visual Integrity</div>
    <div class="card-risk"><span class="dot dot-bm"></span>branch-mutating</div>
  </div></foreignObject>

  <foreignObject x="232" y="176" width="192" height="136"><div xmlns="http://www.w3.org/1999/xhtml" class="card">
    <div class="card-num">07</div>
    <div class="card-title">Infrastructure &amp; DevOps</div>
    <div class="card-risk"><span class="dot dot-it"></span>infra-touching</div>
  </div></foreignObject>

  <foreignObject x="440" y="176" width="192" height="136"><div xmlns="http://www.w3.org/1999/xhtml" class="card">
    <div class="card-num">08</div>
    <div class="card-title">CI/CD &amp; Release Engineering</div>
    <div class="card-risk"><span class="dot dot-bm"></span>branch-mutating</div>
  </div></foreignObject>

  <foreignObject x="648" y="176" width="192" height="136"><div xmlns="http://www.w3.org/1999/xhtml" class="card">
    <div class="card-num">09</div>
    <div class="card-title">Data Layer Integrity</div>
    <div class="card-risk"><span class="dot dot-it"></span>infra-touching</div>
  </div></foreignObject>

